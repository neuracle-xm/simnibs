name: simnibs_env
channels:
  - conda-forge
dependencies:
  - python=3.11
  - cgal-cpp=5.5
  - cython
  - freeglut
  - h5py
  - jsonschema
  - libwebp
  - matplotlib-base
  - mkl
  - mock
  - nibabel
  - numba
  - numpy=1.26
  - pillow
  - pip
  - pyopengl
  - pytest
  - python-mumps
  - requests
  - scipy
  - setuptools-scm
  - tbb-devel
  - zlib
  - mesa-libgl-cos6-x86_64
  - jupyterlab
  - pytorch::ignite
  - pytorch::pytorch=2.5
  - pytorch::cpuonly
  - pip:
    - pyqt5
    - fmm3dpy==1.0.0
    - samseg==0.4a0
    - pygpc==0.4
    - https://github.com/simnibs/petsc4py/releases/download/v3.21.5/petsc4py-3.21.5-cp311-cp311-manylinux_2_28_x86_64.whl
    - https://github.com/simnibs/cortech/releases/download/v0.1/cortech-0.1-cp311-cp311-manylinux_2_24_x86_64.whl
    # - https://github.com/simnibs/brainsynth/releases/download/v0.1a/BrainSynth-0.1a0-py3-none-any.whl
    # - https://github.com/simnibs/brainnet/releases/download/v0.1a/BrainNet-0.1a0-py3-none-any.whl
    - brainsynth@git+https://github.com/simnibs/brainsynth@324dbc1 # v0.1a
    - brainnet@git+https://github.com/simnibs/brainnet@3eec98c # v0.1a
