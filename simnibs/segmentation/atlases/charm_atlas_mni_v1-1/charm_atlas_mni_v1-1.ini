# Atlas specific settings
# left-hand side should be in JSON synthax
# int = 1
# float = 1.2
# bool = true/false (lower case)
# str = "string" (double qotes)
# list = [1, 2, 3]
# dict = {"a": 1, "b": 2} (key must be string)
# affine_atlas = "atlasForAffineRegistration.txt.gz"

[names]
